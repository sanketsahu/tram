name: Deploy website to GitHub Pages

# The Next.js site lives in website/ and is exported statically, then published
# to GitHub Pages as a project site at https://sanketsahu.github.io/jetplane

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Least privilege: read the repo, write the Pages deployment, mint the OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; queue at most one more.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    env:
      NEXT_PUBLIC_BASE_PATH: /jetplane
      NEXT_PUBLIC_SITE_URL: https://sanketsahu.github.io/jetplane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
